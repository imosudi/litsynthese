<!-- Sidebar Navigation -->
<aside class="sidebar">
    <div class="brand">
        <div class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                <path d="M12 5v6M9 8h6" opacity="0.9"></path>
            </svg>
        </div>
        <h1>LitSynthese</h1>
    </div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
        <button id="nav-dashboard" class="nav-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9"></rect>
                <rect x="14" y="3" width="7" height="5"></rect>
                <rect x="14" y="12" width="7" height="9"></rect>
                <rect x="3" y="16" width="7" height="5"></rect>
            </svg>
            <span>Dashboard</span>
        </button>
        <button id="nav-matrix" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
                <line x1="15" y1="3" x2="15" y2="21"></line>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="3" y1="15" x2="21" y2="15"></line>
            </svg>
            <span>Comparison Matrix</span>
        </button>
        <button id="nav-synthesis" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
            <span>Cross-Doc Synthesis</span>
        </button>
        <button id="nav-profile" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </button>
    </nav>

    <!-- Project Selector -->
    <div class="project-selector-section">
        <label for="project-select">Active Project</label>
        <div class="project-select-wrapper">
            <select id="project-select" class="project-select-dropdown">
                <!-- Loaded dynamically -->
            </select>
            <button id="new-project-btn" class="project-action-btn" title="Create New Project">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button id="delete-project-btn" class="project-action-btn delete" title="Delete Active Project">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Model Selector -->
    <div class="model-selector-section">
        <label for="model-select">Synthesis & Chat Model</label>
        <div class="model-select-wrapper">
            <select id="model-select" class="model-select-dropdown">
                <option value="gemini">Gemini (Auto-select)</option>
                <option value="llama">LLaMA (Auto-select)</option>
                <option value="openrouter/qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B (OpenRouter)</option>
                <option value="openrouter/google/gemma-4-31b-it">Gemma 4 31B (OpenRouter)</option>
            </select>
        </div>
    </div>

    <!-- Upload Area -->
    <div class="upload-section">
        <div class="drop-zone" id="drop-zone">
            <svg class="upload-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17 8L12 3L7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p class="drop-text">Drag & drop paper PDF</p>
            <span class="browse-btn">Browse files</span>
            <input type="file" id="file-input" accept="application/pdf" hidden>
        </div>
        <!-- Progress Indicator -->
        <div class="progress-container hidden" id="progress-container">
            <div class="progress mb-2" style="height: 6px;">
                <div class="progress-bar" id="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <span class="progress-status" id="progress-status">Uploading...</span>
        </div>
    </div>

    <!-- Ingested Papers List -->
    <div class="papers-list-section">
        <h2>Parsed Literature</h2>
        <div class="papers-list" id="papers-list">
            <div class="empty-list-state">No papers uploaded yet</div>
        </div>
    </div>

    <!-- Settings / Config -->
    <div class="sidebar-footer">
        <div class="theme-toggle-wrapper">
            <span>Theme</span>
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
            <span id="theme-flash-name" class="theme-flash-name"></span>
        </div>
        <div class="api-status">
            <span class="status-dot green"></span>
            <span class="status-text">FastAPI Connected</span>
        </div>

            <a href="https://mioemi.com" target="_blank" rel="noopener">mioemi.com</a>
        </div>
    </div>
</aside>
