<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Card Drop Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Gradients for Nodes -->
    <linearGradient id="grad-user" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="grad-frontend" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="grad-backend" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="grad-parser" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="grad-citations" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="grad-llm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad-gemini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Main Background -->
  <rect width="100%" height="100%" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <!-- GRID / BACKGROUND DETAILS -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="150" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="700" cy="200" r="200" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- NODES -->
  
  <!-- User -->
  <g transform="translate(30, 40)" filter="url(#shadow)">
    <rect width="100" height="50" rx="25" fill="url(#grad-user)"/>
    <text x="50" y="30" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">User</text>
  </g>

  <!-- Frontend SPA -->
  <g transform="translate(190, 35)" filter="url(#shadow)">
    <rect width="160" height="60" rx="12" fill="url(#grad-frontend)"/>
    <text x="80" y="28" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Frontend SPA</text>
    <text x="80" y="46" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">HTML / CSS / JS</text>
  </g>

  <!-- FastAPI Backend -->
  <g transform="translate(420, 35)" filter="url(#shadow)">
    <rect width="160" height="60" rx="12" fill="url(#grad-backend)"/>
    <text x="80" y="28" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">FastAPI Backend</text>
    <text x="80" y="46" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Python API Server</text>
  </g>

  <!-- PDF Parser -->
  <g transform="translate(650, 35)" filter="url(#shadow)">
    <rect width="160" height="60" rx="12" fill="url(#grad-parser)"/>
    <text x="80" y="28" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">PDF Parser</text>
    <text x="80" y="46" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">PyPDF Structure</text>
  </g>

  <!-- Citation Linker -->
  <g transform="translate(650, 185)" filter="url(#shadow)">
    <rect width="160" height="60" rx="12" fill="url(#grad-citations)"/>
    <text x="80" y="28" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Citation Linker</text>
    <text x="80" y="46" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Bibliography Mapper</text>
  </g>

  <!-- LLM Service -->
  <g transform="translate(420, 185)" filter="url(#shadow)">
    <rect width="160" height="60" rx="12" fill="url(#grad-llm)"/>
    <text x="80" y="28" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">LLM Service</text>
    <text x="80" y="46" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">RAG Context Engine</text>
  </g>

  <!-- Gemini API -->
  <g transform="translate(190, 185)" filter="url(#shadow)">
    <rect width="160" height="60" rx="12" fill="url(#grad-gemini)"/>
    <text x="80" y="28" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Gemini API</text>
    <text x="80" y="46" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">2.5-Flash / Mock</text>
  </g>


  <!-- ARROWS AND FLOWS -->

  <!-- User -> Frontend -->
  <path d="M 130 65 L 182 65" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="135" y="46" width="45" height="15" rx="4" fill="#1e293b"/>
  <text x="157" y="57" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">PDF</text>

  <!-- Frontend -> FastAPI -->
  <path d="M 350 65 L 412 65" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="357" y="46" width="50" height="15" rx="4" fill="#1e293b"/>
  <text x="382" y="57" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Upload</text>

  <!-- FastAPI -> Parser -->
  <path d="M 580 65 L 642 65" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="587" y="46" width="50" height="15" rx="4" fill="#1e293b"/>
  <text x="612" y="57" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Text Ext</text>

  <!-- Parser -> Citations -->
  <path d="M 730 95 L 730 177" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="702" y="125" width="56" height="15" rx="4" fill="#1e293b"/>
  <text x="730" y="136" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Sections</text>

  <!-- Citations -> LLM Service -->
  <path d="M 650 215 L 590 215" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="597" y="196" width="46" height="15" rx="4" fill="#1e293b"/>
  <text x="620" y="207" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Map</text>

  <!-- LLM Service -> Gemini -->
  <path d="M 420 215 L 360 215" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="367" y="196" width="46" height="15" rx="4" fill="#1e293b"/>
  <text x="390" y="207" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Prompt</text>

  <!-- Gemini -> LLM Service (Response) -->
  <path d="M 360 225 L 420 225" fill="none" stroke="#64748b" stroke-dasharray="4" stroke-width="2" marker-end="url(#arrow)"/>

</svg>
